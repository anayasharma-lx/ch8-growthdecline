<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Growth and Decline — Ganita Prakash Grade 8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0ede8;--border:#d8d4cc;
  --text:#1a1814;--text2:#5a5650;--text3:#9a958e;
  --blue:#2c5f9e;--red:#c0392b;--green:#1a7a4a;--orange:#e08020;
  --font:'DM Sans',-apple-system,sans-serif;--mono:'DM Mono',ui-monospace,monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
.page{max-width:860px;margin:0 auto;padding:28px 20px}
.lbl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.title{font-size:22px;font-weight:700;margin-bottom:5px}
.subtitle{font-size:14px;color:var(--text2);margin-bottom:22px;max-width:560px;line-height:1.5}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:22px;margin-bottom:16px}

/* Scenario selector */
.scene-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.sc-btn{padding:7px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:12.5px;font-weight:500;color:var(--text2);background:var(--surface);cursor:pointer;font-family:var(--font);transition:all .12s}
.sc-btn.active{background:var(--text);color:#fff;border-color:var(--text)}

/* Sliders */
.sl-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.sl-row label{font-size:13px;font-weight:500;color:var(--text2);min-width:140px}
.sl-row input[type=range]{flex:1;height:5px;cursor:pointer}
.sl-val{font-family:var(--mono);font-size:15px;font-weight:700;min-width:80px;text-align:right}

/* Main display */
.main-layout{display:grid;grid-template-columns:1fr 280px;gap:18px;align-items:start;margin-top:16px}
@media(max-width:580px){.main-layout{grid-template-columns:1fr}}
canvas{display:block;width:100%;border-radius:8px;border:1.5px solid var(--border);background:#fafaf8}

/* Side panel */
.side-panel{display:flex;flex-direction:column;gap:10px}
.stat-item{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px}
.stat-item .si-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px}
.stat-item .si-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text)}

.insight{background:#fff8f0;border:1.5px solid #f0d8c0;border-radius:10px;padding:13px 18px;font-size:13px;color:#6b4400;line-height:1.65}
.insight strong{color:#a05000}
.insight .eq{font-family:var(--mono);font-size:12px;display:block;margin:2px 0}
</style>
</head>
<body>
<div class="page">
  <div class="lbl">Chapter 1 · Fractions in Disguise</div>
  <div class="title">Growth and Decline</div>
  <div class="subtitle">When a quantity changes by the same percentage each period, the change compounds — small rates create surprising long-term effects. Explore growth (population, bacteria) and decline (depreciation).</div>

  <div class="card">
    <div class="scene-row">
      <button class="sc-btn active" data-s="0">Population growth</button>
      <button class="sc-btn" data-s="1">Depreciation (TV/vehicle)</button>
      <button class="sc-btn" data-s="2">Bacteria growth</button>
      <button class="sc-btn" data-s="3">Village decline</button>
    </div>

    <div class="sl-row">
      <label id="initLabel">Initial population</label>
      <input type="range" id="initSlider" min="100" max="100000" step="100" value="15000" style="accent-color:var(--blue)">
      <span class="sl-val" style="color:var(--blue)" id="initVal">15,000</span>
    </div>
    <div class="sl-row">
      <label id="rateLabel">Rate per period (%)</label>
      <input type="range" id="rateSlider" min="0.5" max="30" step="0.5" value="3" style="accent-color:var(--orange)">
      <span class="sl-val" style="color:var(--orange)" id="rateVal">3%</span>
    </div>
    <div class="sl-row">
      <label id="periodsLabel">Periods</label>
      <input type="range" id="periodsSlider" min="1" max="30" step="1" value="3" style="accent-color:var(--green)">
      <span class="sl-val" style="color:var(--green)" id="periodsVal">3</span>
    </div>

    <div class="main-layout">
      <div><canvas id="cvs" height="260"></canvas></div>
      <div class="side-panel" id="sidePanel"></div>
    </div>

    <div class="insight" id="insight"></div>
  </div>
</div>

<script>
const SCENES = [
  {init:15000,rate:3,periods:10,initLbl:'Initial population',rateLbl:'Annual growth rate (%)',periodsLbl:'Years',isGrowth:true,unit:'people',color:'#2c5f9e',
   context:'City of 15,000 growing at 3% per year', formula:'P × (1.03)ⁿ'},
  {init:21000,rate:5,periods:5,initLbl:'Purchase price (₹)',rateLbl:'Annual depreciation (%)',periodsLbl:'Years',isGrowth:false,unit:'₹',color:'#c0392b',
   context:'TV depreciating 5% per year', formula:'P × (0.95)ⁿ'},
  {init:506000,rate:2.5,periods:4,initLbl:'Initial bacteria count',rateLbl:'Hourly growth rate (%)',periodsLbl:'Hours',isGrowth:true,unit:'bacteria',color:'#1a7a4a',
   context:'Bacteria doubling every ~28 hours', formula:'P × (1.025)ⁿ'},
  {init:1250,rate:10,periods:5,initLbl:'Initial population',rateLbl:'Decline per decade (%)',periodsLbl:'Decades',isGrowth:false,unit:'people',color:'#e08020',
   context:'Village losing 10% per decade', formula:'P × (0.90)ⁿ'},
];

let sc=0, init=15000, rate=3, periods=10;

function loadScene(i) {
  sc=i;
  const s=SCENES[i];
  init=s.init; rate=s.rate; periods=s.periods;
  document.getElementById('initSlider').value=init;
  document.getElementById('rateSlider').value=rate;
  document.getElementById('periodsSlider').value=periods;
  document.getElementById('initVal').textContent=init.toLocaleString('en-IN');
  document.getElementById('rateVal').textContent=rate+'%';
  document.getElementById('periodsVal').textContent=periods;
  document.getElementById('initLabel').textContent=s.initLbl;
  document.getElementById('rateLabel').textContent=s.rateLbl;
  document.getElementById('periodsLabel').textContent=s.periodsLbl;
  update();
}

function computeValues() {
  const s=SCENES[sc];
  const factor = s.isGrowth ? (1+rate/100) : (1-rate/100);
  const vals=[init];
  for(let i=1;i<=periods;i++) vals.push(vals[vals.length-1]*factor);
  return vals;
}

function drawChart(vals) {
  const cvs=document.getElementById('cvs');
  const PR=window.devicePixelRatio||1;
  const W=cvs.parentElement.clientWidth;
  cvs.width=W*PR; cvs.height=260*PR;
  cvs.style.width=W+'px'; cvs.style.height='260px';
  const ctx=cvs.getContext('2d');
  ctx.scale(PR,PR);
  ctx.fillStyle='#fafaf8'; ctx.fillRect(0,0,W,260);

  const PAD={l:56,r:16,t:16,b:36};
  const cW=W-PAD.l-PAD.r, cH=260-PAD.t-PAD.b;
  const minV=Math.min(...vals)*0.95, maxV=Math.max(...vals)*1.05;
  const range=maxV-minV||1;
  const s=SCENES[sc];

  const px=i=>PAD.l+(i/periods)*cW;
  const py=v=>PAD.t+cH-((v-minV)/range)*cH;

  // Grid
  for(let g=0;g<=4;g++){
    const v=minV+range*g/4;
    const y=py(v);
    ctx.beginPath(); ctx.strokeStyle='#e8e4de'; ctx.lineWidth=1;
    ctx.moveTo(PAD.l,y); ctx.lineTo(W-PAD.r,y); ctx.stroke();
    ctx.fillStyle='#9a958e'; ctx.font='10px DM Mono'; ctx.textAlign='right';
    const label=v>=1000?(v/1000).toFixed(1)+'k':Math.round(v).toString();
    ctx.fillText(label,PAD.l-5,y+4);
  }

  // Axis labels
  ctx.fillStyle='#9a958e'; ctx.font='10px DM Sans'; ctx.textAlign='center';
  for(let i=0;i<=Math.min(periods,10);i++){
    const step=Math.ceil(periods/10);
    const ii=i*step;
    if(ii>periods) break;
    ctx.fillText(ii,px(ii),260-PAD.b+16);
  }

  // Fill under curve
  ctx.beginPath();
  ctx.moveTo(px(0),py(vals[0]));
  vals.forEach((_,i)=>ctx.lineTo(px(i),py(vals[i])));
  ctx.lineTo(px(periods),PAD.t+cH);
  ctx.lineTo(PAD.l,PAD.t+cH);
  ctx.closePath();
  ctx.fillStyle=s.color+'22'; ctx.fill();

  // Curve
  ctx.beginPath();
  ctx.strokeStyle=s.color; ctx.lineWidth=2.5;
  vals.forEach((v,i)=>i===0?ctx.moveTo(px(i),py(v)):ctx.lineTo(px(i),py(v)));
  ctx.stroke();

  // Dots
  vals.forEach((v,i)=>{
    ctx.beginPath(); ctx.fillStyle=s.color;
    ctx.arc(px(i),py(v),4,0,Math.PI*2); ctx.fill();
  });

  // Start/end labels
  ctx.fillStyle=s.color; ctx.font='bold 11px DM Mono'; ctx.textAlign='left';
  ctx.fillText(vals[0].toLocaleString('en-IN'),PAD.l+4,py(vals[0])-6);
  ctx.textAlign=periods>5?'right':'left';
  ctx.fillText(Math.round(vals[vals.length-1]).toLocaleString('en-IN'),px(periods)+(periods>5?-4:4),py(vals[vals.length-1])-6);
}

function update() {
  const vals=computeValues();
  drawChart(vals);
  const s=SCENES[sc];
  const finalVal=vals[vals.length-1];
  const changePct=(finalVal-init)/init*100;

  document.getElementById('sidePanel').innerHTML=`
    <div class="stat-item"><div class="si-lbl">Starting value</div><div class="si-val">${init.toLocaleString('en-IN')} ${s.unit}</div></div>
    <div class="stat-item"><div class="si-lbl">After ${periods} ${s.periodsLbl.split(' ')[0].toLowerCase()}</div><div class="si-val" style="color:${s.color}">${Math.round(finalVal).toLocaleString('en-IN')} ${s.unit}</div></div>
    <div class="stat-item"><div class="si-lbl">Net change</div><div class="si-val" style="color:${s.isGrowth?'var(--green)':'var(--red)'}">${changePct>=0?'+':''}${changePct.toFixed(1)}%</div></div>
    <div class="stat-item"><div class="si-lbl">Factor per period</div><div class="si-val">${s.isGrowth?1+rate/100:1-rate/100}</div></div>`;

  document.getElementById('insight').innerHTML=
    `<strong>Formula:</strong> ${s.formula}
    <span class="eq">= ${init.toLocaleString()} × ${(s.isGrowth?1+rate/100:1-rate/100).toFixed(4)}^${periods}</span>
    <span class="eq">= ${init.toLocaleString()} × ${Math.pow(s.isGrowth?1+rate/100:1-rate/100,periods).toFixed(5)}</span>
    <span class="eq">= <strong>${Math.round(finalVal).toLocaleString('en-IN')} ${s.unit}</strong></span>
    ${s.isGrowth?`Each period, the value is multiplied by ${1+rate/100} — which is why even a small rate creates a large long-term change.`:`Each period, the value is multiplied by ${(1-rate/100).toFixed(3)} — the decline is always relative to the current value, not the original.`}`;
}

document.querySelectorAll('.sc-btn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.sc-btn').forEach(x=>x.classList.toggle('active',x===b));
    loadScene(parseInt(b.dataset.s));
  };
});
document.getElementById('initSlider').oninput=e=>{init=parseInt(e.target.value);document.getElementById('initVal').textContent=parseInt(e.target.value).toLocaleString('en-IN');update();};
document.getElementById('rateSlider').oninput=e=>{rate=parseFloat(e.target.value);document.getElementById('rateVal').textContent=rate+'%';update();};
document.getElementById('periodsSlider').oninput=e=>{periods=parseInt(e.target.value);document.getElementById('periodsVal').textContent=periods;update();};

window.addEventListener('resize',()=>{const vals=computeValues();drawChart(vals);});
loadScene(0);
</script>
</body>
</html>
